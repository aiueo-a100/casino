<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>カジノ整理券</title><style>*{box-sizing:border-box;margin:0;padding:0}body{background:#0e1f14;color:#f0e6c0;font-family:system-ui,sans-serif;min-height:100vh}#app{max-width:480px;margin:0 auto}.center{display:flex;flex-direction:column;align-items:center}.page{padding:40px 24px;min-height:100vh}.btn-primary{background:linear-gradient(135deg,#c8a84b,#e8c96b);color:#0e1f14;border:none;border-radius:14px;padding:18px 0;font-size:17px;font-weight:700;cursor:pointer;width:100%;max-width:320px;letter-spacing:1px;margin-top:8px}.btn-primary:disabled{opacity:.4;cursor:not-allowed}.btn-ghost{background:transparent;color:#c8a84b;border:1px solid rgba(200,168,75,.4);border-radius:14px;padding:12px 0;font-size:14px;font-weight:600;cursor:pointer;width:100%;max-width:320px;margin-top:8px}.btn-back{background:none;border:none;color:#4a6a4a;font-size:13px;cursor:pointer;align-self:flex-start}.btn-circle{width:28px;height:28px;border-radius:14px;background:#1a3a2a;border:1px solid #2a5a2a;color:#c8a84b;font-size:16px;cursor:pointer}.card{background:#162518;border:1px solid #2a4a2a;border-radius:14px;padding:18px 20px;margin-bottom:14px}.card-gold{border-color:#c8a84b}.muted{color:#4a6a4a;font-size:13px}.gold{color:#c8a84b}.booth-btn{background:#162518;border:1px solid #2a4a2a;border-radius:14px;padding:14px 16px;width:100%;max-width:320px;margin-top:8px;cursor:pointer;text-align:left;display:flex;justify-content:space-between;align-items:center}.booth-btn:disabled{opacity:.4;cursor:not-allowed}.booth-btn.card-zone{border-color:#c8a84b33;background:#1a2a18}.booth-name{font-size:16px;font-weight:700;color:#f0e6c0}.booth-info{font-size:12px;color:#4a6a4a;margin-top:2px}.booth-wait{font-size:13px;color:#c8a84b;font-weight:600}.progress-bar{width:100%;height:6px;background:#2a4a2a;border-radius:3px;margin-top:8px;overflow:hidden}.progress-fill{height:100%;border-radius:3px}.chip{padding:8px 12px;border-radius:10px;font-size:14px;font-weight:700}.chip-inside{background:#1a3a2a;border:1px solid #2a5a2a;color:#4caf7d;cursor:pointer}.chip-wait{background:#162518;border:1px solid #2a4a2a;color:#9a8a5a}.note{font-size:11px;color:#2a4a2a;text-align:center;margin-top:16px}.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%;max-width:280px;margin-top:16px}.numpad-btn{background:#162518;border:1px solid #2a4a2a;border-radius:12px;color:#f0e6c0;font-size:24px;font-weight:600;padding:18px 0;cursor:pointer;-webkit-tap-highlight-color:transparent}.numpad-btn:active{background:#1a3a2a}.pw-display{width:100%;max-width:280px;background:#162518;border:1px solid #2a4a2a;border-radius:12px;padding:16px;text-align:center;font-size:32px;letter-spacing:8px;color:#c8a84b;margin-top:8px;min-height:64px}.pw-display.error-border{border-color:#e53e3e}.header-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}.header-title{font-size:13px;font-weight:700;color:#9a8a5a;letter-spacing:2px}.btn-reset{font-size:11px;color:#4a3a3a;background:none;border:none;cursor:pointer}.calling-banner{width:100%;background:#1a3a1a;border:2px solid #c8a84b;border-radius:16px;padding:16px 20px;text-align:center;margin-bottom:16px}#loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:16px}.loading-text{color:#c8a84b;font-size:14px;letter-spacing:2px}.toast{position:fixed;top:24px;left:50%;transform:translateX(-50%);background:#4caf7d;color:#fff;padding:14px 28px;border-radius:14px;font-weight:700;font-size:15px;z-index:999;box-shadow:0 4px 20px rgba(0,0,0,.4);white-space:nowrap}.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:100;padding:24px}.modal{background:#162518;border:1px solid #2a4a2a;border-radius:16px;padding:28px 24px;width:100%;max-width:320px;text-align:center}.people-select{display:flex;gap:10px;margin-top:16px;justify-content:center}.people-btn{width:56px;height:56px;border-radius:12px;background:#162518;border:2px solid #2a4a2a;color:#f0e6c0;font-size:20px;font-weight:700;cursor:pointer}.people-btn.selected{border-color:#c8a84b;color:#c8a84b;background:#1a3a1a}@keyframes calledFlash{0%,100%{background:#0e1f14}50%{background:#1a3a00}}.called-anim{animation:calledFlash 0.6s infinite}</style></head><body>
<div id="loading"><div class="loading-text">読み込み中...</div></div>
<div id="app" style="display:none"></div>
<div id="modal-root"></div>
<script>
const SUPABASE_URL="https://hnrkfecbewrjwsooxvde.supabase.co";
const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhucmtmZWNiZXdyandzb294dmRlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxMTA2MjcsImV4cCI6MjA5NzY4NjYyN30.iTDfmIQxTFEi7013YOmvf844uf2l0XBtOyWQ2tsVeFs";
const STAFF_PASSWORD="1234";
const CARD_BOOTHS=["babanuki","shinkei","highandlow"];
let pwInput="",prevCalling=null,selectedPeople=1,pendingBooth=null;

function saveMyTickets(t){try{localStorage.setItem("myTickets",JSON.stringify(t))}catch(e){}}
function loadMyTickets(){try{const t=localStorage.getItem("myTickets");return t?JSON.parse(t):[]}catch(e){return[]}}
function getViewFromURL(){return new URLSearchParams(location.search).get("v")||"home"}
function setURLView(v){const u=new URL(location.href);v==="home"?u.searchParams.delete("v"):u.searchParams.set("v",v);history.replaceState(null,"",u)}

async function apiFetch(path,opts={}){
  const ctrl=new AbortController();
  const tid=setTimeout(()=>ctrl.abort(),10000);
  try{
    const res=await fetch(`${SUPABASE_URL}/rest/v1/${path}`,{signal:ctrl.signal,headers:{apikey:SUPABASE_KEY,Authorization:`Bearer ${SUPABASE_KEY}`,"Content-Type":"application/json",Prefer:"return=representation",...(opts.headers||{})},...opts});
    clearTimeout(tid);const text=await res.text();return text?JSON.parse(text):null;
  }catch(e){clearTimeout(tid);throw e}
}

const db={
  getTickets:()=>apiFetch("tickets?order=number.asc"),
  getBooths:()=>apiFetch("booths?order=id.asc"),
  getState:()=>apiFetch("state?id=eq.1").then(r=>r?.[0]),
  issueTicket:(number,booth,people)=>apiFetch("tickets",{method:"POST",body:JSON.stringify({number,booth,status:"waiting",people})}),
  updateTicket:(id,patch)=>apiFetch(`tickets?id=eq.${id}`,{method:"PATCH",body:JSON.stringify(patch)}),
  updateBooth:(id,patch)=>apiFetch(`booths?id=eq.${id}`,{method:"PATCH",body:JSON.stringify(patch)}),
  updateState:(patch)=>apiFetch("state?id=eq.1",{method:"PATCH",body:JSON.stringify(patch)}),
  getNextNumber:async(booth)=>{const t=await apiFetch(`tickets?booth=eq.${booth}&select=number&order=number.desc&limit=1`);return t?.length?t[0].number+1:1},
};

let state={view:getViewFromURL(),staffAuthed:false,tickets:[],booths:[],dbState:{calling_number:null,calling_booth:null},myTickets:loadMyTickets(),busy:false,loaded:false};

function showToast(msg,color="#4caf7d"){const t=document.createElement("div");t.className="toast";t.style.background=color;t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),2500)}
function vibrate(){try{if(navigator.vibrate)navigator.vibrate([200,100,200,100,200])}catch(e){}}

async function initialLoad(){
  try{
    const[tickets,booths,dbState]=await Promise.all([db.getTickets(),db.getBooths(),db.getState()]);
    state.tickets=tickets||[];state.booths=booths||[];
    if(dbState)state.dbState=dbState;
    state.loaded=true;render();
  }catch(e){
    const el=document.getElementById("loading");
    if(el)el.innerHTML=`<div style="color:#fc8181;padding:32px;text-align:center;font-size:14px">接続できませんでした</div><button onclick="location.reload()" style="margin-top:16px;padding:12px 24px;background:#c8a84b;color:#0e1f14;border:none;border-radius:10px;font-weight:700;cursor:pointer;font-size:15px">再読み込み</button>`;
  }
}

async function refresh(){
  try{
    const[tickets,dbState]=await Promise.all([db.getTickets(),db.getState()]);
    state.tickets=tickets||[];
    if(dbState){
      if(dbState.calling_number&&dbState.calling_number!==prevCalling){
        const hit=state.myTickets.find(mt=>mt.number===dbState.calling_number&&mt.booth===dbState.calling_booth);
        if(hit){vibrate();document.body.classList.add("called-anim");setTimeout(()=>document.body.classList.remove("called-anim"),3000)}
      }
      prevCalling=dbState.calling_number;state.dbState=dbState;
    }
    render();
  }catch(e){}
}

function setState(patch){Object.assign(state,patch);if(patch.view!==undefined)setURLView(patch.view);if(patch.myTickets!==undefined)saveMyTickets(patch.myTickets);render()}

function render(){
  if(!state.loaded)return;
  const app=document.getElementById("app"),loading=document.getElementById("loading");
  if(loading)loading.style.display="none";app.style.display="block";
  const{view,staffAuthed}=state;
  if(view==="home")app.innerHTML=renderHome();
  else if(view==="guest")app.innerHTML=renderGuest();
  else if(view==="guest_select")app.innerHTML=renderBoothSelectPage();
  else if(view==="guest_card")app.innerHTML=renderCardSelect();
  else if(view==="staff")app.innerHTML=staffAuthed?renderStaff():renderAuth();
}

function renderHome(){
  const{dbState,booths}=state;
  const banner=dbState.calling_number?`<div class="calling-banner"><div style="font-size:11px;color:#c8a84b;letter-spacing:3px;margin-bottom:4px">📢 呼び出し中</div><div style="font-size:48px;font-weight:900;color:#c8a84b;line-height:1">${String(dbState.calling_number).padStart(3,"0")}</div><div style="font-size:13px;color:#9a8a5a;margin-top:4px">${booths.find(b=>b.id===dbState.calling_booth)?.name||""}</div></div>`:"";
  return`<div class="page center"><div style="font-size:13px;letter-spacing:5px;color:#9a8a5a;text-transform:uppercase;margin-bottom:8px">Casino</div><div style="font-size:36px;font-weight:900;letter-spacing:-1px;margin-bottom:4px">整理券</div><div class="muted" style="margin-bottom:32px">文化祭カジノ</div>${banner}<button class="btn-primary" onclick="goGuest()">整理券を取る</button><button class="btn-ghost" onclick="goStaff()">スタッフ用</button></div>`
}

function renderGuest(){
  const{tickets,booths,dbState,myTickets}=state;
  const activeTickets=myTickets.filter(mt=>{const t=tickets.find(t=>t.id===mt.id);return!t||t.status!=="done"});
  const cards=activeTickets.map(mt=>{
    const t=tickets.find(t=>t.id===mt.id),booth=booths.find(b=>b.id===mt.booth);
    const called=dbState.calling_number===mt.number&&dbState.calling_booth===mt.booth;
    const status=t?t.status:"waiting";
    const statusHtml=called?`<div style="color:#c8a84b;font-weight:700;font-size:13px">📢 受付へ！</div>`:status==="inside"?`<div style="color:#4caf7d;font-size:13px">✅ 入場中</div>`:`<div style="color:#9a8a5a;font-size:13px">待機中</div>`;
    return`<div class="card" style="border:${called?"2px solid #c8a84b":"1px solid #2a4a2a"}"><div style="display:flex;justify-content:space-between;align-items:center"><div><div style="font-size:11px;color:#4a6a4a;margin-bottom:2px">${booth?.name||mt.booth}</div><div style="font-size:40px;font-weight:900;color:${called?"#c8a84b":"#f0e6c0"}">${String(mt.number).padStart(3,"0")}</div>${mt.people>1?`<div style="font-size:11px;color:#4a6a4a">${mt.people}人</div>`:""}</div>${statusHtml}</div></div>`
  }).join("");
  return`<div class="page"><button class="btn-back" onclick="goHome()">← ホームへ</button><div style="margin-top:24px;font-size:13px;color:#9a8a5a;letter-spacing:2px;margin-bottom:12px">あなたの整理券</div>${cards||`<div class="muted" style="margin:24px 0">まだ整理券がありません</div>`}<button class="btn-primary" style="margin-top:16px" onclick="setState({view:'guest_select'})">別のブースの整理券を取る</button><div class="note">自動更新中（5秒ごと）</div></div>`
}

function progressBar(inside,capacity){
  const pct=Math.min(100,Math.round(inside/capacity*100));
  const color=pct>=100?"#e53e3e":pct>=75?"#f5c842":"#4caf7d";
  return`<div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${color}"></div></div>`
}

function boothCard(b,onclick){
  const{tickets,myTickets}=state;
  const waiting=tickets.filter(t=>t.booth===b.id&&t.status==="waiting").length;
  const inside=tickets.filter(t=>t.booth===b.id&&t.status==="inside").length;
  const full=inside>=b.capacity;
  const hasTicket=myTickets.some(mt=>mt.booth===b.id&&tickets.find(t=>t.id===mt.id&&t.status!=="done"));
  const waitColor=full?"#e53e3e":hasTicket?"#4caf7d":"#c8a84b";
  const waitText=full?"満員":hasTicket?"取得済み✅":`待ち ${waiting}人`;
  return`<button class="booth-btn" onclick="${onclick}" ${state.busy||full||hasTicket?"disabled":""}><div><div class="booth-name">${b.name}</div><div class="booth-info">${inside}/${b.capacity}人入場中</div>${progressBar(inside,b.capacity)}</div><div class="booth-wait" style="color:${waitColor};margin-left:12px;flex-shrink:0">${waitText}</div></button>`
}

function renderBoothSelectPage(){
  const{booths,tickets}=state;
  const nonCard=booths.filter(b=>!CARD_BOOTHS.includes(b.id));
  const cardWaiting=CARD_BOOTHS.reduce((s,id)=>s+tickets.filter(t=>t.booth===id&&t.status==="waiting").length,0);
  const cardInside=CARD_BOOTHS.reduce((s,id)=>s+tickets.filter(t=>t.booth===id&&t.status==="inside").length,0);
  const cardCap=booths.filter(b=>CARD_BOOTHS.includes(b.id)).reduce((s,b)=>s+b.capacity,0)||12;
  const cardFull=cardInside>=cardCap;
  const cardBtn=`<button class="booth-btn card-zone" onclick="setState({view:'guest_card'})" ${state.busy?"disabled":""}><div><div class="booth-name">♠ カードゾーン</div><div class="booth-info">ババ抜き・神経衰弱・ハイアンドロー</div>${progressBar(cardInside,cardCap)}</div><div class="booth-wait" style="color:${cardFull?"#e53e3e":"#c8a84b"};margin-left:12px;flex-shrink:0">${cardFull?"満員":`待ち ${cardWaiting}人`}</div></button>`;
  return`<div class="page center"><button class="btn-back" onclick="setState({view:'guest'})">← 戻る</button><div style="margin-top:24px;font-size:15px;font-weight:700;margin-bottom:8px">ブースを選んでください</div><div style="font-size:12px;color:#4a6a4a;margin-bottom:20px">整理券を取るブースをタップ</div>${cardBtn}${nonCard.map(b=>boothCard(b,`openPeopleModal('${b.id}')`)).join("")}</div>`
}

function renderCardSelect(){
  return`<div class="page center"><button class="btn-back" onclick="setState({view:'guest_select'})">← 戻る</button><div style="margin-top:24px;font-size:15px;font-weight:700;margin-bottom:8px">♠ カードゾーン</div><div style="font-size:12px;color:#4a6a4a;margin-bottom:20px">種目を選んでください</div>${state.booths.filter(b=>CARD_BOOTHS.includes(b.id)).map(b=>boothCard(b,`openPeopleModal('${b.id}')`)).join("")}</div>`
}

function openPeopleModal(booth){
  pendingBooth=booth;selectedPeople=1;
  const name=state.booths.find(b=>b.id===booth)?.name||booth;
  document.getElementById("modal-root").innerHTML=`<div class="modal-overlay" onclick="closeModal()"><div class="modal" onclick="event.stopPropagation()"><div style="font-size:15px;font-weight:700;margin-bottom:4px">${name}</div><div class="muted" style="margin-bottom:16px">何人で参加しますか？</div><div class="people-select">${[1,2,3,4].map(n=>`<button class="people-btn${n===1?" selected":""}" id="pb${n}" onclick="selectPeople(${n})">${n}</button>`).join("")}</div><button class="btn-primary" style="margin-top:20px" onclick="confirmIssue()">整理券を取る</button><button class="btn-ghost" style="margin-top:4px" onclick="closeModal()">キャンセル</button></div></div>`
}
function selectPeople(n){selectedPeople=n;[1,2,3,4].forEach(i=>{const b=document.getElementById("pb"+i);if(b)b.className="people-btn"+(i===n?" selected":"")})}
function closeModal(){document.getElementById("modal-root").innerHTML=""}
async function confirmIssue(){closeModal();await issueTicket(pendingBooth,selectedPeople)}

function renderAuth(){pwInput="";return`<div class="page center"><button class="btn-back" onclick="goHome()">← ホームへ</button><div style="font-size:32px;margin:24px 0 8px">🔒</div><div class="muted" style="margin-bottom:8px">スタッフ用パスワード</div><div class="pw-display" id="pw-display">----</div><div id="pw-error" style="color:#fc8181;font-size:12px;margin-top:8px;display:none">パスワードが違います</div><div class="numpad"><button class="numpad-btn" onclick="pwTap('1')">1</button><button class="numpad-btn" onclick="pwTap('2')">2</button><button class="numpad-btn" onclick="pwTap('3')">3</button><button class="numpad-btn" onclick="pwTap('4')">4</button><button class="numpad-btn" onclick="pwTap('5')">5</button><button class="numpad-btn" onclick="pwTap('6')">6</button><button class="numpad-btn" onclick="pwTap('7')">7</button><button class="numpad-btn" onclick="pwTap('8')">8</button><button class="numpad-btn" onclick="pwTap('9')">9</button><button class="numpad-btn" onclick="pwClear()" style="font-size:16px">消去</button><button class="numpad-btn" onclick="pwTap('0')">0</button><button class="numpad-btn" onclick="checkAuth()" style="background:#c8a84b;color:#0e1f14;font-size:16px">OK</button></div></div>`}

function renderStaff(){
  const{tickets,booths,dbState,busy}=state;
  const cb=booths.find(b=>b.id===dbState.calling_booth);
  const callingBlock=dbState.calling_number?`<div class="card card-gold"><div style="font-size:11px;color:#4a6a4a;letter-spacing:3px">呼び出し中</div><div style="text-align:center;margin-top:8px"><div style="font-size:13px;color:#9a8a5a;margin-bottom:4px">${cb?.name||""}</div><div style="font-size:52px;font-weight:900;color:#c8a84b">${String(dbState.calling_number).padStart(3,"0")} 番</div><button class="btn-primary" style="background:linear-gradient(135deg,#4caf7d,#6dcf9d);margin-top:8px" onclick="confirmEntry()" ${busy?"disabled":""}>入場確認</button><br><button class="btn-ghost" style="border:none;margin-top:4px;font-size:12px" onclick="cancelCall()">キャンセル</button></div></div>`:"";
  const boothBlocks=booths.map(b=>{
    const waiting=tickets.filter(t=>t.booth===b.id&&t.status==="waiting");
    const inside=tickets.filter(t=>t.booth===b.id&&t.status==="inside");
    const canCall=waiting.length>0&&!dbState.calling_number;
    return`<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><div style="font-size:14px;font-weight:700">${b.name}</div><div style="display:flex;align-items:center;gap:8px"><span style="font-size:11px;color:#4a6a4a">上限</span><button class="btn-circle" onclick="changeCap('${b.id}',-1)">－</button><span style="font-size:14px;font-weight:700;color:#c8a84b;min-width:20px;text-align:center">${b.capacity}</span><button class="btn-circle" onclick="changeCap('${b.id}',1)">＋</button></div></div><div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px">${inside.map(t=>`<button class="chip chip-inside" onclick="exitTicket(${t.id})">${String(t.number).padStart(3,"0")}${t.people>1?`(${t.people})`:""} <span style="font-size:10px;opacity:.6">退場</span></button>`).join("")||`<span style="font-size:12px;color:#2a4a2a">入場中なし</span>`}</div><div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px">${waiting.map(t=>`<span class="chip chip-wait">${String(t.number).padStart(3,"0")}${t.people>1?`(${t.people})`:""}</span>`).join("")||`<span style="font-size:12px;color:#2a4a2a">待機なし</span>`}</div><button class="btn-primary" style="font-size:13px;padding:10px 0" onclick="callNext('${b.id}')" ${!canCall||busy?"disabled":""}>${waiting.length>0?`${waiting[0].number}番を呼び出す`:"待機者なし"}</button></div>`
  }).join("");
  return`<div style="max-width:480px;margin:0 auto;padding:24px 16px"><div class="header-row"><button class="btn-back" onclick="goHome()">← ホームへ</button><div class="header-title">スタッフ管理</div><button class="btn-reset" onclick="resetAll()">リセット</button></div>${callingBlock}${boothBlocks}<div class="note">自動更新中（5秒ごと）</div></div>`
}

function goHome(){setState({view:"home"})}
function goGuest(){state.myTickets.length>0?setState({view:"guest"}):setState({view:"guest_select"})}
function goStaff(){setState({view:"staff"})}
function pwTap(n){if(pwInput.length>=4)return;pwInput+=n;const d=document.getElementById("pw-display");if(d)d.textContent="●".repeat(pwInput.length)+"－".repeat(4-pwInput.length)}
function pwClear(){pwInput=pwInput.slice(0,-1);const d=document.getElementById("pw-display");if(d)d.textContent="●".repeat(pwInput.length)+"－".repeat(4-pwInput.length)}
function checkAuth(){if(pwInput===STAFF_PASSWORD){setState({staffAuthed:true})}else{const el=document.getElementById("pw-error"),d=document.getElementById("pw-display");if(el)el.style.display="block";if(d)d.classList.add("error-border");pwInput="";setTimeout(()=>{if(d){d.classList.remove("error-border");d.textContent="----"}if(el)el.style.display="none"},1000)}}

async function issueTicket(booth,people=1){
  setState({busy:true});
  try{
    const nextNum=await db.getNextNumber(booth);
    const res=await db.issueTicket(nextNum,booth,people);
    if(res&&res[0]){setState({myTickets:[...state.myTickets,{id:res[0].id,number:nextNum,booth,people}],busy:false,view:"guest"});showToast(`✅ No.${String(nextNum).padStart(3,"0")} 整理券を取得しました！`)}
    else setState({busy:false});
    await refresh();
  }catch(e){setState({busy:false});showToast("⚠️ 取得に失敗しました","#e53e3e")}
}

async function callNext(boothId){setState({busy:true});const w=state.tickets.filter(t=>t.booth===boothId&&t.status==="waiting");if(!w.length){setState({busy:false});return}await db.updateState({calling_number:w[0].number,calling_booth:boothId});await refresh();setState({busy:false})}
async function confirmEntry(){const{dbState,tickets}=state;const t=tickets.find(t=>t.number===dbState.calling_number&&t.booth===dbState.calling_booth);if(!t)return;setState({busy:true});await db.updateTicket(t.id,{status:"inside"});await db.updateState({calling_number:null,calling_booth:null});await refresh();setState({busy:false})}
async function exitTicket(id){setState({busy:true});await db.updateTicket(id,{status:"done"});await refresh();setState({busy:false})}
async function cancelCall(){setState({busy:true});await db.updateState({calling_number:null,calling_booth:null});await refresh();setState({busy:false})}
async function changeCap(boothId,delta){const b=state.booths.find(b=>b.id===boothId);if(!b)return;await db.updateBooth(boothId,{capacity:Math.max(1,b.capacity+delta)});await refresh()}
async function resetAll(){if(!confirm("全データをリセットしますか？"))return;for(const t of state.tickets)await db.updateTicket(t.id,{status:"done"});await db.updateState({calling_number:null,calling_booth:null});setState({myTickets:[]});await refresh()}

initialLoad();
setInterval(refresh,5000);
</script></body></html>
