<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>カジノ整理券</title><style>*{box-sizing:border-box;margin:0;padding:0}body{background:#0e1f14;color:#f0e6c0;font-family:system-ui,sans-serif;min-height:100vh}#app{max-width:480px;margin:0 auto}.center{display:flex;flex-direction:column;align-items:center}.page{padding:40px 24px;min-height:100vh}.btn-primary{background:linear-gradient(135deg,#c8a84b,#e8c96b);color:#0e1f14;border:none;border-radius:14px;padding:18px 0;font-size:17px;font-weight:700;cursor:pointer;width:100%;max-width:320px;letter-spacing:1px;margin-top:8px}.btn-primary:disabled{opacity:.4;cursor:not-allowed}.btn-ghost{background:transparent;color:#c8a84b;border:1px solid rgba(200,168,75,.4);border-radius:14px;padding:12px 0;font-size:14px;font-weight:600;cursor:pointer;width:100%;max-width:320px;margin-top:8px}.btn-ghost:disabled{opacity:.4;cursor:not-allowed}.btn-danger{background:transparent;color:#fc8181;border:1px solid rgba(252,129,129,.4);border-radius:14px;padding:10px 0;font-size:13px;font-weight:600;cursor:pointer;width:100%;max-width:320px;margin-top:6px}.btn-danger:disabled{opacity:.4;cursor:not-allowed}.btn-back{background:none;border:none;color:#4a6a4a;font-size:13px;cursor:pointer;align-self:flex-start}.btn-circle{width:28px;height:28px;border-radius:14px;background:#1a3a2a;border:1px solid #2a5a2a;color:#c8a84b;font-size:16px;cursor:pointer}.btn-circle:disabled{opacity:.4}.card{background:#162518;border:1px solid #2a4a2a;border-radius:14px;padding:18px 20px;margin-bottom:14px}.card-gold{border-color:#c8a84b}.muted{color:#4a6a4a;font-size:13px}.gold{color:#c8a84b}.booth-btn{background:#162518;border:1px solid #2a4a2a;border-radius:14px;padding:14px 16px;width:100%;max-width:320px;margin-top:8px;cursor:pointer;text-align:left;display:flex;justify-content:space-between;align-items:center}.booth-btn:disabled{opacity:.4;cursor:not-allowed}.booth-btn.card-zone{border-color:#c8a84b33;background:#1a2a18}.booth-name{font-size:16px;font-weight:700;color:#f0e6c0}.booth-wait{font-size:13px;font-weight:600;flex-shrink:0;margin-left:12px}.progress-bar{width:100%;height:6px;background:#2a4a2a;border-radius:3px;margin-top:8px;overflow:hidden}.progress-fill{height:100%;border-radius:3px}.chip{padding:8px 12px;border-radius:10px;font-size:14px;font-weight:700}.chip-inside{background:#1a3a2a;border:1px solid #2a5a2a;color:#4caf7d;cursor:pointer}.chip-wait{background:#162518;border:1px solid #2a4a2a;color:#9a8a5a}.note{font-size:11px;color:#2a4a2a;text-align:center;margin-top:16px}.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%;max-width:280px;margin-top:16px}.numpad-btn{background:#162518;border:1px solid #2a4a2a;border-radius:12px;color:#f0e6c0;font-size:24px;font-weight:600;padding:18px 0;cursor:pointer;-webkit-tap-highlight-color:transparent}.numpad-btn:active{background:#1a3a2a}.pw-display{width:100%;max-width:280px;background:#162518;border:1px solid #2a4a2a;border-radius:12px;padding:16px;text-align:center;font-size:32px;letter-spacing:8px;color:#c8a84b;margin-top:8px;min-height:64px}.pw-display.error-border{border-color:#e53e3e}.header-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}.header-title{font-size:13px;font-weight:700;color:#9a8a5a;letter-spacing:2px}.calling-banner{width:100%;background:#1a3a1a;border:2px solid #c8a84b;border-radius:16px;padding:16px 20px;text-align:center;margin-bottom:16px}#loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:16px}.loading-text{color:#c8a84b;font-size:14px;letter-spacing:2px}.toast{position:fixed;top:24px;left:50%;transform:translateX(-50%);background:#4caf7d;color:#fff;padding:14px 28px;border-radius:14px;font-weight:700;font-size:15px;z-index:999;box-shadow:0 4px 20px rgba(0,0,0,.4);white-space:nowrap}.offline-bar{position:fixed;top:0;left:0;right:0;background:#7a2a2a;color:#fff;text-align:center;font-size:12px;padding:6px;z-index:998}.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:100;padding:24px}.modal{background:#162518;border:1px solid #2a4a2a;border-radius:16px;padding:28px 24px;width:100%;max-width:320px;text-align:center}.people-select{display:flex;gap:10px;margin-top:16px;justify-content:center}.people-btn{width:56px;height:56px;border-radius:12px;background:#162518;border:2px solid #2a4a2a;color:#f0e6c0;font-size:20px;font-weight:700;cursor:pointer}.people-btn.selected{border-color:#c8a84b;color:#c8a84b;background:#1a3a1a}.star-row{display:flex;gap:8px;justify-content:center;margin:16px 0;font-size:40px}.star{cursor:pointer;opacity:.3}.star.active{opacity:1}@keyframes calledFlash{0%,100%{background:#0e1f14}50%{background:#1a3a00}}.called-anim{animation:calledFlash 0.6s infinite}</style></head><body>

<div id="loading"><div class="loading-text">読み込み中...</div></div>
<div id="app" style="display:none"></div>
<div id="modal-root"></div>
<script>
const SUPABASE_URL="https://hnrkfecbewrjwsooxvde.supabase.co";
const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhucmtmZWNiZXdyandzb294dmRlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxMTA2MjcsImV4cCI6MjA5NzY4NjYyN30.iTDfmIQxTFEi7013YOmvf844uf2l0XBtOyWQ2tsVeFs";
const STAFF_PASSWORD="1234";
const CARD_BOOTHS=["babanuki","shinkei","highandlow"];
let pwInput="",prevCalling=null,selectedPeople=1,pendingBooth=null,selectedRating=0,reviewBooth="";

function saveMyTickets(t){try{localStorage.setItem("myTickets",JSON.stringify(t))}catch(e){}}
function loadMyTickets(){try{const t=localStorage.getItem("myTickets");return t?JSON.parse(t):[]}catch(e){return[]}}
function saveReviewed(r){try{localStorage.setItem("reviewed",JSON.stringify(r))}catch(e){}}
function loadReviewed(){try{const r=localStorage.getItem("reviewed");return r?JSON.parse(r):[]}catch(e){return[]}}
function getViewFromURL(){return new URLSearchParams(location.search).get("v")||"home"}
function setURLView(v){const u=new URL(location.href);v==="home"?u.searchParams.delete("v"):u.searchParams.set("v",v);history.replaceState(null,"",u)}

async function apiFetch(path,opts={}){
  const ctrl=new AbortController();
  const tid=setTimeout(()=>ctrl.abort(),10000);
  try{
    const {headers:optHeaders, ...restOpts}=opts;
    const res=await fetch(`${SUPABASE_URL}/rest/v1/${path}`,{
      ...restOpts,
      signal:ctrl.signal,
      headers:{apikey:SUPABASE_KEY,Authorization:`Bearer ${SUPABASE_KEY}`,"Content-Type":"application/json",Prefer:"return=representation",...(optHeaders||{})}
    });
    clearTimeout(tid);
    const text=await res.text();
    if(!res.ok){
      console.error("API error",res.status,text);
      throw new Error("HTTP "+res.status+": "+text);
    }
    return text?JSON.parse(text):null;
  }catch(e){clearTimeout(tid);throw e}
}

const db={
  // 改善4: done以外のチケットのみ取得（時間が経っても重くならない）
  getActiveTickets:()=>apiFetch("tickets?status=neq.done&order=number.asc"),
  getBooths:()=>apiFetch("booths?order=id.asc"),
  getState:()=>apiFetch("state?id=eq.1").then(r=>r?.[0]),
  getReviews:()=>apiFetch("reviews?select=booth_id,rating"),
  // 改善1: 採番をDBに任せず、衝突したら自動リトライする方式（issueTicketWithRetryで使用）
  insertTicket:(number,booth,people)=>apiFetch("tickets",{method:"POST",headers:{Prefer:"return=representation"},body:JSON.stringify({number,booth,status:"waiting",people})}),
  updateTicket:(id,patch)=>apiFetch(`tickets?id=eq.${id}`,{method:"PATCH",body:JSON.stringify(patch)}),
  deleteTicket:(id)=>apiFetch(`tickets?id=eq.${id}`,{method:"DELETE",headers:{"Content-Type":"application/json"}}),
  updateBooth:(id,patch)=>apiFetch(`booths?id=eq.${id}`,{method:"PATCH",body:JSON.stringify(patch)}),
  updateState:(patch)=>apiFetch("state?id=eq.1",{method:"PATCH",body:JSON.stringify(patch)}),
  addReview:(booth_id,rating)=>apiFetch("reviews",{method:"POST",body:JSON.stringify({booth_id,rating})}),
  getMaxNumber:async(booth)=>{const t=await apiFetch(`tickets?booth=eq.${booth}&select=number&order=number.desc&limit=1`);return t?.length?t[0].number:0},
};

let state={view:getViewFromURL(),staffAuthed:false,tickets:[],booths:[],reviews:[],dbState:{calling_number:null,calling_booth:null},myTickets:loadMyTickets(),reviewed:loadReviewed(),busy:false,loaded:false,offline:false};

function showToast(msg,color="#4caf7d"){const t=document.createElement("div");t.className="toast";t.style.background=color;t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),2500)}
function vibrate(){try{if(navigator.vibrate)navigator.vibrate([200,100,200,100,200])}catch(e){}}

// 改善3: 通信エラー時に上部へ警告バーを表示
function renderOffline(){
  const root=document.getElementById("offline-root");
  if(!root)return;
  root.innerHTML=state.offline?`<div class="offline-bar">⚠️ 通信エラー：最新の情報が取得できていません</div>`:"";
}

async function initialLoad(){
  try{
    const[tickets,booths,dbState]=await Promise.all([db.getActiveTickets(),db.getBooths(),db.getState()]);
    state.tickets=tickets||[];state.booths=booths||[];
    if(dbState)state.dbState=dbState;
    state.loaded=true;state.offline=false;render();
    db.getReviews().then(r=>{state.reviews=r||[];render()}).catch(()=>{});
  }catch(e){
    const el=document.getElementById("loading");
    if(el)el.innerHTML=`<div style="color:#fc8181;padding:32px;text-align:center;font-size:14px">接続できませんでした</div><button onclick="location.reload()" style="margin-top:16px;padding:12px 24px;background:#c8a84b;color:#0e1f14;border:none;border-radius:10px;font-weight:700;cursor:pointer;font-size:15px">再読み込み</button>`;
  }
}

async function refresh(){
  try{
    const[tickets,booths,dbState]=await Promise.all([db.getActiveTickets(),db.getBooths(),db.getState()]);
    state.tickets=tickets||[];
    state.booths=booths||[];
    if(dbState){
      if(dbState.calling_number&&dbState.calling_number!==prevCalling){
        const hit=state.myTickets.find(mt=>mt.number===dbState.calling_number&&mt.booth===dbState.calling_booth);
        if(hit){vibrate();document.body.classList.add("called-anim");setTimeout(()=>document.body.classList.remove("called-anim"),3000)}
      }
      prevCalling=dbState.calling_number;state.dbState=dbState;
    }
    // myTicketsのうち、待機/入場中チケットに無いものはdoneかキャンセル済み。
    // ただしdoneはレビュー用に残したいので「キャンセル(=DBから完全削除)」だけを除外する。
    // activeに無い & doneにも無い = 削除された → myTicketsから消す
    // activeに無いがdone扱いのものはレビュー用に残す（reviewedで管理）
    // ここではactiveTicketsしかDBから来ないため、myTicketのstatusを補完する。
    state.offline=false;
    render();
  }catch(e){
    // 改善3: 失敗時は古い情報のまま警告だけ出す
    state.offline=true;
    render();
  }
}

function setState(patch){
  Object.assign(state,patch);
  if(patch.view!==undefined)setURLView(patch.view);
  if(patch.myTickets!==undefined)saveMyTickets(patch.myTickets);
  if(patch.reviewed!==undefined)saveReviewed(patch.reviewed);
  render();
}

function render(){
  if(!state.loaded)return;
  renderOffline();
  const app=document.getElementById("app"),loading=document.getElementById("loading");
  if(loading)loading.style.display="none";app.style.display="block";
  const{view,staffAuthed}=state;
  if(view==="home")app.innerHTML=renderHome();
  else if(view==="guest")app.innerHTML=renderGuest();
  else if(view==="guest_select")app.innerHTML=renderBoothSelectPage();
  else if(view==="guest_card")app.innerHTML=renderCardSelect();
  else if(view==="review")app.innerHTML=renderReviewPage();
  else if(view==="staff")app.innerHTML=staffAuthed?renderStaff():renderAuth();
}

function progressBar(inside,capacity){
  const pct=Math.min(100,Math.round(inside/capacity*100));
  const color=pct>=100?"#e53e3e":pct>=75?"#f5c842":"#4caf7d";
  return`<div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${color}"></div></div>`
}

function renderHome(){
  const{dbState,booths}=state;
  const banner=dbState.calling_number?`<div class="calling-banner"><div style="font-size:11px;color:#c8a84b;letter-spacing:3px;margin-bottom:4px">📢 呼び出し中</div><div style="font-size:48px;font-weight:900;color:#c8a84b;line-height:1">${String(dbState.calling_number).padStart(3,"0")}</div><div style="font-size:13px;color:#9a8a5a;margin-top:4px">${booths.find(b=>b.id===dbState.calling_booth)?.name||""}</div></div>`:"";
  return`<div class="page center"><div style="font-size:13px;letter-spacing:5px;color:#9a8a5a;text-transform:uppercase;margin-bottom:8px">Casino</div><div style="font-size:36px;font-weight:900;letter-spacing:-1px;margin-bottom:4px">整理券</div><div class="muted" style="margin-bottom:32px">文化祭カジノ</div>${banner}<button class="btn-primary" onclick="goGuest()">整理券を取る</button><button class="btn-ghost" onclick="goStaff()">スタッフ用</button></div>`
}

function renderGuest(){
  const{tickets,booths,dbState,myTickets,reviewed,busy}=state;
  // activeTicketsにあるもの＝待機/入場中
  const activeTickets=myTickets.filter(mt=>tickets.find(t=>t.id===mt.id));
  // activeに無い＝done(終了)かキャンセル済み。レビュー用には「reviewedされてない自分のbrooth」を出す
  const doneCandidates=myTickets.filter(mt=>!tickets.find(t=>t.id===mt.id));

  const cards=activeTickets.map(mt=>{
    const t=tickets.find(t=>t.id===mt.id),booth=booths.find(b=>b.id===mt.booth);
    const called=dbState.calling_number===mt.number&&dbState.calling_booth===mt.booth;
    const status=t.status;
    const statusHtml=called?`<div style="color:#c8a84b;font-weight:700;font-size:13px">📢 受付へ！</div>`:status==="inside"?`<div style="color:#4caf7d;font-size:13px">✅ 入場中</div>`:`<div style="color:#9a8a5a;font-size:13px">待機中</div>`;
    const cancelBtn=status==="waiting"&&!called?`<button class="btn-danger" onclick="cancelTicket(${mt.id})" ${busy?"disabled":""}>キャンセル</button>`:"";
    return`<div class="card" style="border:${called?"2px solid #c8a84b":"1px solid #2a4a2a"}"><div style="display:flex;justify-content:space-between;align-items:center"><div><div style="font-size:11px;color:#4a6a4a;margin-bottom:2px">${booth?.name||mt.booth}</div><div style="font-size:40px;font-weight:900;color:${called?"#c8a84b":"#f0e6c0"}">${String(mt.number).padStart(3,"0")}</div>${mt.people>1?`<div style="font-size:11px;color:#4a6a4a">${mt.people}人</div>`:""}</div>${statusHtml}</div>${cancelBtn}</div>`
  }).join("");

  // 終了済みbrooth（重複booth除去）のうち未レビューのみレビューボタンを出す
  const doneBooths=[...new Set(doneCandidates.map(mt=>mt.booth))].filter(bid=>!reviewed.includes(bid));
  const reviewBtns=doneBooths.map(bid=>{
    const booth=booths.find(b=>b.id===bid);
    return`<button class="btn-ghost" style="margin-top:6px" onclick="openReview('${bid}')">⭐ ${booth?.name||bid} のレビューを書く</button>`
  }).join("");

  const nothing=activeTickets.length===0&&reviewBtns==="";
  return`<div class="page"><button class="btn-back" onclick="goHome()">← ホームへ</button><div style="margin-top:24px;font-size:13px;color:#9a8a5a;letter-spacing:2px;margin-bottom:12px">あなたの整理券</div>${nothing?`<div class="muted" style="margin:24px 0">まだ整理券がありません</div>`:""}${cards}${reviewBtns}<button class="btn-primary" style="margin-top:16px" onclick="setState({view:'guest_select'})">別のブースの整理券を取る</button><div class="note">自動更新中（5秒ごと）</div></div>`
}

function boothCard(b,onclick){
  const{tickets,myTickets,reviews}=state;
  const waiting=tickets.filter(t=>t.booth===b.id&&t.status==="waiting").length;
  const inside=tickets.filter(t=>t.booth===b.id&&t.status==="inside").length;
  const full=inside>=b.capacity;
  const hasTicket=myTickets.some(mt=>mt.booth===b.id&&tickets.find(t=>t.id===mt.id));
  const waitColor=full?"#e53e3e":hasTicket?"#4caf7d":"#c8a84b";
  const waitText=full?"満員":hasTicket?"取得済み✅":`待ち ${waiting}人`;
  const avgMin=b.avg_minutes||10;
  const waitTime=!full&&!hasTicket&&waiting>0?`約${waiting*avgMin}分待ち`:"";
  const br=reviews.filter(r=>r.booth_id===b.id);
  const avgRating=br.length?Math.round(br.reduce((s,r)=>s+r.rating,0)/br.length*10)/10:null;
  return`<button class="booth-btn" onclick="${onclick}" ${state.busy||full||hasTicket?"disabled":""}><div style="flex:1"><div class="booth-name">${b.name}</div><div style="font-size:12px;color:#4a6a4a;margin-top:2px">${inside}/${b.capacity}人入場中${avgRating?` ⭐${avgRating}`:""}</div>${waitTime?`<div style="font-size:11px;color:#9a8a5a;margin-top:2px">${waitTime}</div>`:""} ${progressBar(inside,b.capacity)}</div><div class="booth-wait" style="color:${waitColor}">${waitText}</div></button>`
}

function renderBoothSelectPage(){
  const{booths,tickets}=state;
  const nonCard=booths.filter(b=>!CARD_BOOTHS.includes(b.id));
  const cardWaiting=CARD_BOOTHS.reduce((s,id)=>s+tickets.filter(t=>t.booth===id&&t.status==="waiting").length,0);
  const cardInside=CARD_BOOTHS.reduce((s,id)=>s+tickets.filter(t=>t.booth===id&&t.status==="inside").length,0);
  const cardCap=booths.filter(b=>CARD_BOOTHS.includes(b.id)).reduce((s,b)=>s+b.capacity,0)||12;
  const cardFull=cardInside>=cardCap;
  const cardBtn=`<button class="booth-btn card-zone" onclick="setState({view:'guest_card'})" ${state.busy?"disabled":""}><div style="flex:1"><div class="booth-name">♠ カードゾーン</div><div style="font-size:12px;color:#4a6a4a;margin-top:2px">ババ抜き・神経衰弱・ハイアンドロー</div>${progressBar(cardInside,cardCap)}</div><div class="booth-wait" style="color:${cardFull?"#e53e3e":"#c8a84b"}">${cardFull?"満員":`待ち ${cardWaiting}人`}</div></button>`;
  return`<div class="page center"><button class="btn-back" onclick="setState({view:'guest'})">← 戻る</button><div style="margin-top:24px;font-size:15px;font-weight:700;margin-bottom:8px">ブースを選んでください</div><div style="font-size:12px;color:#4a6a4a;margin-bottom:20px">整理券を取るブースをタップ</div>${cardBtn}${nonCard.map(b=>boothCard(b,`openPeopleModal('${b.id}')`)).join("")}</div>`
}

function renderCardSelect(){
  return`<div class="page center"><button class="btn-back" onclick="setState({view:'guest_select'})">← 戻る</button><div style="margin-top:24px;font-size:15px;font-weight:700;margin-bottom:8px">♠ カードゾーン</div><div style="font-size:12px;color:#4a6a4a;margin-bottom:20px">種目を選んでください</div>${state.booths.filter(b=>CARD_BOOTHS.includes(b.id)).map(b=>boothCard(b,`openPeopleModal('${b.id}')`)).join("")}</div>`
}

function openPeopleModal(booth){
  pendingBooth=booth;selectedPeople=1;
  const name=state.booths.find(b=>b.id===booth)?.name||booth;
  document.getElementById("modal-root").innerHTML=`<div class="modal-overlay" onclick="closeModal()"><div class="modal" onclick="event.stopPropagation()"><div style="font-size:15px;font-weight:700;margin-bottom:4px">${name}</div><div class="muted" style="margin-bottom:16px">何人で参加しますか？</div><div class="people-select">${[1,2,3,4].map(n=>`<button class="people-btn${n===1?" selected":""}" id="pb${n}" onclick="selectPeople(${n})">${n}</button>`).join("")}</div><button class="btn-primary" style="margin-top:20px" id="modal-issue" onclick="confirmIssue()">整理券を取る</button><button class="btn-ghost" style="margin-top:4px" onclick="closeModal()">キャンセル</button></div></div>`
}
function selectPeople(n){selectedPeople=n;[1,2,3,4].forEach(i=>{const b=document.getElementById("pb"+i);if(b)b.className="people-btn"+(i===n?" selected":"")})}
function closeModal(){document.getElementById("modal-root").innerHTML=""}
async function confirmIssue(){
  // 改善2: モーダルのボタンを即ロックして連打防止
  const btn=document.getElementById("modal-issue");
  if(btn){if(btn.disabled)return;btn.disabled=true;btn.textContent="発行中..."}
  closeModal();
  await issueTicket(pendingBooth,selectedPeople);
}

function openReview(booth){reviewBooth=booth;selectedRating=0;setState({view:"review"})}
function renderReviewPage(){
  const booth=state.booths.find(b=>b.id===reviewBooth);
  return`<div class="page center"><button class="btn-back" onclick="setState({view:'guest'})">← 戻る</button><div style="margin-top:32px;font-size:18px;font-weight:700;margin-bottom:4px">${booth?.name||reviewBooth}</div><div class="muted" style="margin-bottom:8px">どうでしたか？</div><div class="star-row">${[1,2,3,4,5].map(n=>`<span class="star${n<=selectedRating?" active":""}" id="star${n}" onclick="setRating(${n})">⭐</span>`).join("")}</div><div id="rating-label" style="font-size:14px;color:#9a8a5a;margin-bottom:24px">${selectedRating>0?["","😢 最悪","😐 微妙","🙂 普通","😊 良い","🎉 最高！"][selectedRating]:"タップして評価"}</div><button class="btn-primary" id="review-submit" onclick="submitReview()" ${selectedRating===0?"disabled":""}>送信する</button></div>`
}
function setRating(n){selectedRating=n;[1,2,3,4,5].forEach(i=>{const s=document.getElementById("star"+i);if(s)s.className="star"+(i<=n?" active":"")});const l=document.getElementById("rating-label");if(l)l.textContent=["","😢 最悪","😐 微妙","🙂 普通","😊 良い","🎉 最高！"][n];const btn=document.getElementById("review-submit");if(btn)btn.disabled=false}
async function submitReview(){
  if(!selectedRating)return;
  // 改善2: 送信ボタンを即ロック
  const btn=document.getElementById("review-submit");
  if(btn){if(btn.disabled)return;btn.disabled=true;btn.textContent="送信中..."}
  try{
    await db.addReview(reviewBooth,selectedRating);
    setState({reviewed:[...state.reviewed,reviewBooth],view:"guest"});
    showToast("⭐ レビューありがとう！");
    db.getReviews().then(r=>{state.reviews=r||[];render()}).catch(()=>{});
  }catch(e){
    if(btn){btn.disabled=false;btn.textContent="送信する"}
    showToast("⚠️ 送信に失敗しました","#e53e3e");
  }
}

function renderAuth(){pwInput="";return`<div class="page center"><button class="btn-back" onclick="goHome()">← ホームへ</button><div style="font-size:32px;margin:24px 0 8px">🔒</div><div class="muted" style="margin-bottom:8px">スタッフ用パスワード</div><div class="pw-display" id="pw-display">----</div><div id="pw-error" style="color:#fc8181;font-size:12px;margin-top:8px;display:none">パスワードが違います</div><div class="numpad"><button class="numpad-btn" onclick="pwTap('1')">1</button><button class="numpad-btn" onclick="pwTap('2')">2</button><button class="numpad-btn" onclick="pwTap('3')">3</button><button class="numpad-btn" onclick="pwTap('4')">4</button><button class="numpad-btn" onclick="pwTap('5')">5</button><button class="numpad-btn" onclick="pwTap('6')">6</button><button class="numpad-btn" onclick="pwTap('7')">7</button><button class="numpad-btn" onclick="pwTap('8')">8</button><button class="numpad-btn" onclick="pwTap('9')">9</button><button class="numpad-btn" onclick="pwClear()" style="font-size:16px">消去</button><button class="numpad-btn" onclick="pwTap('0')">0</button><button class="numpad-btn" onclick="checkAuth()" style="background:#c8a84b;color:#0e1f14;font-size:16px">OK</button></div></div>`}

function renderStaff(){
  const{tickets,booths,dbState,busy,reviews}=state;
  const cb=booths.find(b=>b.id===dbState.calling_booth);
  const callingBlock=dbState.calling_number?`<div class="card card-gold"><div style="font-size:11px;color:#4a6a4a;letter-spacing:3px">呼び出し中</div><div style="text-align:center;margin-top:8px"><div style="font-size:13px;color:#9a8a5a;margin-bottom:4px">${cb?.name||""}</div><div style="font-size:52px;font-weight:900;color:#c8a84b">${String(dbState.calling_number).padStart(3,"0")} 番</div><button class="btn-primary" style="background:linear-gradient(135deg,#4caf7d,#6dcf9d);margin-top:8px" onclick="confirmEntry()" ${busy?"disabled":""}>入場確認</button><br><button class="btn-ghost" style="border:none;margin-top:4px;font-size:12px" onclick="cancelCall()" ${busy?"disabled":""}>キャンセル</button></div></div>`:"";

  const boothBlocks=booths.map(b=>{
    const waiting=tickets.filter(t=>t.booth===b.id&&t.status==="waiting");
    const inside=tickets.filter(t=>t.booth===b.id&&t.status==="inside");
    const canCall=waiting.length>0&&!dbState.calling_number;
    const br=reviews.filter(r=>r.booth_id===b.id);
    const avgRating=br.length?Math.round(br.reduce((s,r)=>s+r.rating,0)/br.length*10)/10:null;
    const curAvg=b.avg_minutes||10;
    return`<div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <div style="font-size:14px;font-weight:700">${b.name}</div>
        <div style="font-size:12px;color:#9a8a5a">${avgRating?`⭐${avgRating}(${br.length}件)`:""}</div>
      </div>
      <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:8px">
        <span style="font-size:11px;color:#4a6a4a">上限</span>
        <button class="btn-circle" onclick="changeCap('${b.id}',-1)" ${busy?"disabled":""}>－</button>
        <span style="font-size:14px;font-weight:700;color:#c8a84b;min-width:20px;text-align:center">${b.capacity}</span>
        <button class="btn-circle" onclick="changeCap('${b.id}',1)" ${busy?"disabled":""}>＋</button>
        <span style="font-size:11px;color:#4a6a4a;margin-left:6px">平均時間</span>
        ${[5,10,15,20,30].map(m=>`<button onclick="setAvgMin('${b.id}',${m})" style="padding:6px 10px;border-radius:8px;background:${curAvg===m?"#c8a84b":"#0e1f14"};color:${curAvg===m?"#0e1f14":"#9a8a5a"};border:1px solid ${curAvg===m?"#c8a84b":"#2a4a2a"};cursor:pointer;font-size:12px;font-weight:${curAvg===m?"700":"400"}">${m}分</button>`).join("")}
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px">${inside.map(t=>`<button class="chip chip-inside" onclick="exitTicket(${t.id})">${String(t.number).padStart(3,"0")}${t.people>1?`(${t.people})`:""} <span style="font-size:10px;opacity:.6">退場</span></button>`).join("")||`<span style="font-size:12px;color:#2a4a2a">入場中なし</span>`}</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px">${waiting.map(t=>`<span class="chip chip-wait">${String(t.number).padStart(3,"0")}${t.people>1?`(${t.people})`:""}</span>`).join("")||`<span style="font-size:12px;color:#2a4a2a">待機なし</span>`}</div>
      <button class="btn-primary" style="font-size:13px;padding:10px 0" onclick="callNext('${b.id}')" ${!canCall||busy?"disabled":""}>${waiting.length>0?`${waiting[0].number}番を呼び出す`:"待機者なし"}</button>
    </div>`
  }).join("");

  return`<div style="max-width:480px;margin:0 auto;padding:24px 16px">
    <div class="header-row">
      <button class="btn-back" onclick="goHome()">← ホームへ</button>
      <div class="header-title">スタッフ管理</div>
      <div style="width:60px"></div>
    </div>
    ${callingBlock}${boothBlocks}
    <div class="note">自動更新中（5秒ごと）</div>
    <div style="margin-top:24px;padding-top:16px;border-top:1px solid #1a3a2a;display:flex;gap:8px">
      <button onclick="resetTicketsOnly()" style="flex:1;padding:10px;background:#162518;border:1px solid #2a4a2a;border-radius:10px;color:#9a8a5a;font-size:11px;cursor:pointer">待機チケットをリセット</button>
      <button onclick="emergencyReset()" style="flex:1;padding:10px;background:#1a0a0a;border:1px solid #3a1a1a;border-radius:10px;color:#fc8181;font-size:11px;cursor:pointer">🚨 全データ削除</button>
    </div>
  </div>`
}

function goHome(){setState({view:"home"})}
function goGuest(){state.myTickets.length>0?setState({view:"guest"}):setState({view:"guest_select"})}
function goStaff(){setState({view:"staff"})}
function pwTap(n){if(pwInput.length>=4)return;pwInput+=n;const d=document.getElementById("pw-display");if(d)d.textContent="●".repeat(pwInput.length)+"－".repeat(4-pwInput.length)}
function pwClear(){pwInput=pwInput.slice(0,-1);const d=document.getElementById("pw-display");if(d)d.textContent="●".repeat(pwInput.length)+"－".repeat(4-pwInput.length)}
function checkAuth(){if(pwInput===STAFF_PASSWORD){setState({staffAuthed:true})}else{const el=document.getElementById("pw-error"),d=document.getElementById("pw-display");if(el)el.style.display="block";if(d)d.classList.add("error-border");pwInput="";setTimeout(()=>{if(d){d.classList.remove("error-border");d.textContent="----"}if(el)el.style.display="none"},1000)}}

// 改善1: 番号採番の衝突対策。POSTが衝突したら最大番号を取り直して最大3回リトライ
async function issueTicket(booth,people=1){
  if(state.busy)return; // 改善2: 多重実行ガード
  setState({busy:true});
  let lastErr=null;
  for(let attempt=0;attempt<5;attempt++){
    try{
      const maxNum=await db.getMaxNumber(booth);
      const nextNum=maxNum+1;
      const res=await db.insertTicket(nextNum,booth,people);
      if(res&&res[0]){
        const created=res[0];
        setState({myTickets:[...state.myTickets,{id:created.id,number:created.number,booth,people}],busy:false,view:"guest"});
        showToast(`✅ No.${String(created.number).padStart(3,"0")} 整理券を取得しました！`);
        await refresh();
        return;
      }
      // resが空＝想定外。次のattemptへ
      lastErr=new Error("空のレスポンス");
    }catch(e){
      lastErr=e;
      // 番号重複(409)なら採番し直してリトライ。それ以外も一応リトライ
      await new Promise(r=>setTimeout(r,150));
    }
  }
  setState({busy:false});
  console.error("issueTicket failed:",lastErr);
  showToast("⚠️ 取得失敗: "+(lastErr?lastErr.message:"不明").slice(0,40),"#e53e3e");
}

async function cancelTicket(id){
  if(state.busy)return; // 改善2
  if(!confirm("整理券をキャンセルしますか？"))return;
  setState({busy:true});
  try{
    await db.deleteTicket(id);
    const newMyTickets=state.myTickets.filter(mt=>mt.id!==id);
    state.myTickets=newMyTickets;saveMyTickets(newMyTickets);
    setState({busy:false});
    showToast("整理券をキャンセルしました");
    await refresh();
  }catch(e){setState({busy:false});showToast("⚠️ キャンセルに失敗しました","#e53e3e")}
}

async function callNext(boothId){
  if(state.busy)return; // 改善2
  setState({busy:true});
  const w=state.tickets.filter(t=>t.booth===boothId&&t.status==="waiting");
  if(!w.length){setState({busy:false});return}
  try{await db.updateState({calling_number:w[0].number,calling_booth:boothId});await refresh()}
  catch(e){showToast("⚠️ 通信エラー","#e53e3e")}
  setState({busy:false});
}
async function confirmEntry(){
  if(state.busy)return;
  const{dbState,tickets}=state;
  const t=tickets.find(t=>t.number===dbState.calling_number&&t.booth===dbState.calling_booth);
  if(!t)return;setState({busy:true});
  try{await db.updateTicket(t.id,{status:"inside"});await db.updateState({calling_number:null,calling_booth:null});await refresh()}
  catch(e){showToast("⚠️ 通信エラー","#e53e3e")}
  setState({busy:false});
}
async function exitTicket(id){
  if(state.busy)return;
  setState({busy:true});
  try{await db.updateTicket(id,{status:"done"});await refresh()}
  catch(e){showToast("⚠️ 通信エラー","#e53e3e")}
  setState({busy:false});
}
async function cancelCall(){
  if(state.busy)return;
  setState({busy:true});
  try{await db.updateState({calling_number:null,calling_booth:null});await refresh()}
  catch(e){showToast("⚠️ 通信エラー","#e53e3e")}
  setState({busy:false});
}

// 上限変更のバグ修正: refreshがbooths再取得するようになったが、
// 押した瞬間の即時反映のためローカルも先に更新してから保存
async function changeCap(boothId,delta){
  if(state.busy)return; // 改善2
  const b=state.booths.find(b=>b.id===boothId);if(!b)return;
  const next=Math.max(1,b.capacity+delta);
  state.busy=true;
  // 即時にローカル反映
  state.booths=state.booths.map(x=>x.id===boothId?{...x,capacity:next}:x);
  render();
  try{
    await db.updateBooth(boothId,{capacity:next});
  }catch(e){showToast("⚠️ 通信エラー","#e53e3e")}
  state.busy=false;
  await refresh();
}

async function setAvgMin(boothId,min){
  if(state.busy)return; // 改善2
  state.busy=true;
  state.booths=state.booths.map(b=>b.id===boothId?{...b,avg_minutes:min}:b);
  render();
  try{
    await db.updateBooth(boothId,{avg_minutes:min});
    showToast(`平均時間を${min}分に設定しました`);
  }catch(e){showToast("⚠️ 通信エラー","#e53e3e")}
  state.busy=false;
}

async function resetTicketsOnly(){
  if(state.busy)return;
  if(!confirm("待機中のチケットをリセットしますか？"))return;
  setState({busy:true});
  try{
    const targets=state.tickets.filter(t=>t.status==="waiting");
    for(const t of targets)await db.deleteTicket(t.id);
    await db.updateState({calling_number:null,calling_booth:null});
    state.myTickets=[];saveMyTickets([]);
    await refresh();
    showToast("チケットをリセットしました");
  }catch(e){showToast("⚠️ 通信エラー","#e53e3e")}
  setState({busy:false});
}

async function emergencyReset(){
  if(state.busy)return;
  if(!confirm("⚠️ 全データを削除します。本当によろしいですか？"))return;
  setState({busy:true});
  try{
    // doneも含めて全削除するため、全件取得して消す
    const all=await apiFetch("tickets?select=id");
    if(all)for(const t of all)await db.deleteTicket(t.id);
    await db.updateState({calling_number:null,calling_booth:null});
    state.myTickets=[];saveMyTickets([]);
    setState({reviewed:[]});
    await refresh();
    showToast("全データを削除しました");
  }catch(e){showToast("⚠️ 通信エラー","#e53e3e")}
  setState({busy:false});
}

initialLoad();
setInterval(()=>{if(!state.busy)refresh()},5000); // 改善2: 処理中は自動更新しない
</script></body></html>
