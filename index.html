<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>カジノ整理券</title><style>*{box-sizing:border-box;margin:0;padding:0}body{background:#0e1f14;color:#f0e6c0;font-family:system-ui,sans-serif;min-height:100vh}#app{max-width:480px;margin:0 auto}.center{display:flex;flex-direction:column;align-items:center}.page{padding:40px 24px;min-height:100vh}.btn-primary{background:linear-gradient(135deg,#c8a84b,#e8c96b);color:#0e1f14;border:none;border-radius:14px;padding:18px 0;font-size:17px;font-weight:700;cursor:pointer;width:100%;max-width:280px;letter-spacing:1px;margin-top:8px}.btn-primary:disabled{opacity:.4;cursor:not-allowed}.btn-ghost{background:transparent;color:#c8a84b;border:1px solid rgba(200,168,75,.4);border-radius:14px;padding:12px 0;font-size:14px;font-weight:600;cursor:pointer;width:100%;max-width:280px;margin-top:8px}.btn-back{background:none;border:none;color:#4a6a4a;font-size:13px;cursor:pointer;align-self:flex-start}.btn-circle{width:44px;height:44px;border-radius:22px;background:#1a3a2a;border:1px solid #2a5a2a;color:#c8a84b;font-size:22px;cursor:pointer}.card{background:#162518;border:1px solid #2a4a2a;border-radius:14px;padding:18px 20px;margin-bottom:14px}.card-gold{border-color:#c8a84b}.label{font-size:11px;color:#4a6a4a;letter-spacing:3px;text-transform:uppercase}.big-num{font-size:96px;font-weight:900;line-height:1;letter-spacing:-4px}.muted{color:#4a6a4a;font-size:13px}.gold{color:#c8a84b}.green{color:#4caf7d}.stat-row{display:flex;gap:24px;padding:16px 32px;background:#162518;border-radius:12px;border:1px solid #2a4a2a;margin-bottom:40px}.stat{text-align:center}.stat-val{font-size:28px;font-weight:800}.stat-label{font-size:10px;color:#4a6a4a;margin-top:2px}.divider{width:1px;background:#2a4a2a}.calling-banner{width:100%;max-width:320px;background:#1a3a1a;border:2px solid #c8a84b;border-radius:16px;padding:20px 24px;text-align:center;margin-bottom:32px}.chip-grid{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}.chip{padding:10px 18px;border-radius:10px;font-size:16px;font-weight:700}.chip-inside{background:#1a3a2a;border:1px solid #2a5a2a;color:#4caf7d;cursor:pointer}.chip-wait{background:#162518;border:1px solid #2a4a2a;color:#9a8a5a}.error{color:#fc8181;font-size:12px;margin-bottom:12px}.note{font-size:11px;color:#2a4a2a;text-align:center;margin-top:16px}.pw-input{width:100%;max-width:280px;padding:16px;border-radius:12px;font-size:24px;text-align:center;background:#162518;border:1px solid #2a4a2a;color:#f0e6c0;outline:none;letter-spacing:4px}.pw-input.error-border{border-color:#e53e3e}.capacity-row{display:flex;align-items:center;justify-content:center;gap:24px;margin-top:8px}.capacity-val{font-size:36px;font-weight:800;color:#f0e6c0;min-width:60px;text-align:center}.capacity-unit{font-size:11px;color:#4a6a4a;font-weight:400}.header-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}.header-title{font-size:13px;font-weight:700;color:#9a8a5a;letter-spacing:2px}.btn-reset{font-size:11px;color:#4a3a3a;background:none;border:none;cursor:pointer}.done-count{text-align:center;font-size:12px;color:#2a4a2a;margin-top:8px}#loading{display:flex;align-items:center;justify-content:center;min-height:100vh}.loading-text{color:#c8a84b;font-size:14px;letter-spacing:2px}</style></head><body>
<div id="loading"><div class="loading-text">読み込み中...</div></div>
<div id="app" style="display:none"></div>
<script>
const SUPABASE_URL="https://hnrkfecbewrjwsooxvde.supabase.co";
const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhucmtmZWNiZXdyandzb294dmRlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxMTA2MjcsImV4cCI6MjA5NzY4NjYyN30.iTDfmIQxTFEi7013YOmvf844uf2l0XBtOyWQ2tsVeFs";
const STAFF_PASSWORD="1234";

// 番号をlocalStorageに保存・復元
function saveMyNumber(n){try{localStorage.setItem("myTicketNumber",n)}catch(e){}}
function loadMyNumber(){try{const n=localStorage.getItem("myTicketNumber");return n?parseInt(n):null}catch(e){return null}}
function clearMyNumber(){try{localStorage.removeItem("myTicketNumber")}catch(e){}}

// URLでページ状態を保持
function getViewFromURL(){const p=new URLSearchParams(location.search);return p.get("v")||"home"}
function setURLView(v){const u=new URL(location.href);if(v==="home")u.searchParams.delete("v");else u.searchParams.set("v",v);history.replaceState(null,"",u)}

async function api(path,opts={}){const res=await fetch(`${SUPABASE_URL}/rest/v1/${path}`,{headers:{apikey:SUPABASE_KEY,Authorization:`Bearer ${SUPABASE_KEY}`,"Content-Type":"application/json",Prefer:"return=representation",...opts.headers},...opts});const text=await res.text();return text?JSON.parse(text):null}
const db={getTickets:()=>api("tickets?order=number.asc"),getState:()=>api("state?id=eq.1").then(r=>r?.[0]),issueTicket:(number)=>api("tickets",{method:"POST",body:JSON.stringify({number,status:"waiting"})}),updateTicket:(number,patch)=>api(`tickets?number=eq.${number}`,{method:"PATCH",body:JSON.stringify(patch)}),updateState:(patch)=>api("state?id=eq.1",{method:"PATCH",body:JSON.stringify(patch)}),getNextNumber:async()=>{const t=await api("tickets?select=number&order=number.desc&limit=1");return t?.length?t[0].number+1:1}};

let state={view:getViewFromURL(),staffAuthed:false,tickets:[],dbState:{calling:null,capacity:8},myTicketNumber:loadMyNumber(),busy:false};

async function refresh(){try{const[tickets,dbState]=await Promise.all([db.getTickets(),db.getState()]);state.tickets=tickets||[];if(dbState)state.dbState=dbState;render()}catch(e){document.getElementById("loading").innerHTML=`<div style="color:#fc8181;padding:32px;text-align:center">接続エラー: ${e.message}</div>`}}
function setState(patch){Object.assign(state,patch);if(patch.view!==undefined)setURLView(patch.view);if(patch.myTicketNumber!==undefined){if(patch.myTicketNumber)saveMyNumber(patch.myTicketNumber);else clearMyNumber()}render()}
function render(){const app=document.getElementById("app");const loading=document.getElementById("loading");if(loading)loading.style.display="none";app.style.display="block";const{view,staffAuthed}=state;if(view==="home")app.innerHTML=renderHome();else if(view==="guest")app.innerHTML=renderGuest();else if(view==="staff")app.innerHTML=staffAuthed?renderStaff():renderAuth()}

function renderHome(){const{tickets,dbState}=state;const waiting=tickets.filter(t=>t.status==="waiting").length;const inside=tickets.filter(t=>t.status==="inside").length;const banner=dbState.calling?`<div class="calling-banner"><div class="label gold" style="margin-bottom:4px">📢 呼び出し中</div><div class="big-num gold">${String(dbState.calling).padStart(3,"0")}</div></div>`:"";return`<div class="page center"><div style="font-size:13px;letter-spacing:5px;color:#9a8a5a;text-transform:uppercase;margin-bottom:8px">Casino</div><div style="font-size:36px;font-weight:900;letter-spacing:-1px;margin-bottom:4px">整理券</div><div class="muted" style="margin-bottom:40px">文化祭カジノ</div>${banner}<div class="stat-row"><div class="stat"><div class="stat-val">${waiting}</div><div class="stat-label">待機中</div></div><div class="divider"></div><div class="stat"><div class="stat-val green">${inside}/${dbState.capacity}</div><div class="stat-label">入場中</div></div></div><button class="btn-primary" onclick="goGuest()">整理券を取る</button><button class="btn-ghost" onclick="goStaff()">スタッフ用</button></div>`}

function renderGuest(){const{tickets,dbState,myTicketNumber,busy}=state;const myTicket=tickets.find(t=>t.number===myTicketNumber);const waiting=tickets.filter(t=>t.status==="waiting").length;const isCalled=myTicket&&dbState.calling===myTicket.number;const otherCalling=dbState.calling&&dbState.calling!==myTicketNumber?`<div class="card" style="text-align:center;margin-top:32px"><div class="muted" style="margin-bottom:4px">現在呼び出し中</div><div style="font-size:28px;font-weight:800" class="gold">${String(dbState.calling).padStart(3,"0")} 番</div></div>`:"";if(myTicket){let content="";if(isCalled){content=`<div style="font-size:13px;letter-spacing:3px;margin-bottom:8px" class="gold">📢 あなたの番です！</div><div class="big-num gold">${String(myTicket.number).padStart(3,"0")}</div><div style="font-size:14px;margin-top:12px" class="gold">入口スタッフにこの画面を見せてください</div>`}else if(myTicket.status==="inside"){content=`<div style="font-size:13px;letter-spacing:2px;margin-bottom:8px" class="green">✅ 入場中</div><div class="big-num green">${String(myTicket.number).padStart(3,"0")}</div><div class="muted" style="margin-top:12px">楽しんでください！</div>`}else if(myTicket.status==="done"){content=`<div class="muted" style="letter-spacing:2px;margin-bottom:8px">退場済み</div><div class="big-num" style="color:#4a6a4a">${String(myTicket.number).padStart(3,"0")}</div><button class="btn-primary" style="margin-top:32px" onclick="setState({myTicketNumber:null})">もう一度整理券を取る</button>`}else{content=`<div class="muted" style="letter-spacing:2px;margin-bottom:8px">あなたの番号</div><div class="big-num">${String(myTicket.number).padStart(3,"0")}</div><div class="muted" style="margin-top:12px">呼ばれるまでお待ちください</div>`}return`<div class="page center"><button class="btn-back" onclick="goHome()">← ホームへ</button><div style="margin-top:32px;text-align:center">${content}</div>${otherCalling}<div class="note" style="margin-top:32px">自動更新中（3秒ごと）</div></div>`}return`<div class="page center"><button class="btn-back" onclick="goHome()">← ホームへ</button><div style="margin-top:32px;margin-bottom:8px;font-size:13px;color:#9a8a5a;letter-spacing:2px">次の番号</div><div class="big-num">---</div><div class="muted" style="margin-bottom:48px">現在 ${waiting} 人待ち</div><button class="btn-primary" onclick="issueTicket()" ${busy?"disabled":""}>${busy?"発行中...":"整理券を取る"}</button></div>`}

function renderAuth(){return`<div class="page center"><button class="btn-back" onclick="goHome()">← ホームへ</button><div style="font-size:32px;margin:24px 0 8px">🔒</div><div class="muted" style="margin-bottom:16px">スタッフ用パスワード</div><input class="pw-input" id="pw-input" type="tel" inputmode="numeric" pattern="[0-9]*" placeholder="----" autocomplete="off" onkeydown="if(event.key==='Enter')checkAuth()"/><div id="pw-error" class="error" style="display:none">パスワードが違います</div><button class="btn-primary" onclick="checkAuth()">入る</button></div>`}

function renderStaff(){const{tickets,dbState,busy}=state;const waiting=tickets.filter(t=>t.status==="waiting");const inside=tickets.filter(t=>t.status==="inside");const done=tickets.filter(t=>t.status==="done");const canEnter=inside.length<dbState.capacity;const callingBlock=dbState.calling?`<div class="card card-gold"><div class="label">呼び出し</div><div style="text-align:center;margin-top:8px"><div style="font-size:52px;font-weight:900" class="gold">${String(dbState.calling).padStart(3,"0")} 番</div><div class="muted" style="margin-bottom:16px">呼び出し中</div><button class="btn-primary" style="background:${canEnter?"linear-gradient(135deg,#4caf7d,#6dcf9d)":"#555"}" onclick="confirmEntry(${dbState.calling})" ${!canEnter||busy?"disabled":""}>${canEnter?"入場確認":`満員 (${inside.length}/${dbState.capacity})`}</button><br><button class="btn-ghost" style="border:none;margin-top:8px;font-size:12px" onclick="cancelCall()">キャンセル</button></div></div>`:`<div class="card"><div class="label">呼び出し</div><div style="text-align:center;margin-top:8px"><div class="muted" style="margin-bottom:16px">${waiting.length>0?`${waiting.length} 人待機中`:"待機者なし"}</div><button class="btn-primary" onclick="callNext()" ${waiting.length===0||busy?"disabled":""}>次を呼び出す</button></div></div>`;const insideBlock=inside.length>0?`<div class="card"><div class="label">入場中 ${inside.length}/${dbState.capacity}</div><div class="chip-grid">${inside.map(t=>`<button class="chip chip-inside" onclick="exitTicket(${t.number})">${String(t.number).padStart(3,"0")} <span style="font-size:11px;opacity:.6">退場</span></button>`).join("")}</div></div>`:"";const waitingBlock=waiting.length>0?`<div class="card"><div class="label">待機中</div><div class="chip-grid">${waiting.map(t=>`<div class="chip chip-wait">${String(t.number).padStart(3,"0")}</div>`).join("")}</div></div>`:"";return`<div style="max-width:440px;margin:0 auto;padding:24px 16px"><div class="header-row"><button class="btn-back" onclick="goHome()">← ホームへ</button><div class="header-title">スタッフ管理</div><button class="btn-reset" onclick="resetAll()">リセット</button></div><div class="card"><div class="label">同時入場上限</div><div class="capacity-row"><button class="btn-circle" onclick="changeCapacity(-1)">－</button><div class="capacity-val">${dbState.capacity}<div class="capacity-unit">人</div></div><button class="btn-circle" onclick="changeCapacity(1)">＋</button></div></div>${callingBlock}${insideBlock}${waitingBlock}${done.length>0?`<div class="done-count">退場済み ${done.length} 人</div>`:""}<div class="note">自動更新中（3秒ごと）</div></div>`}

function goHome(){setState({view:"home"})}
function goGuest(){setState({view:"guest"})}
function goStaff(){setState({view:"staff"})}
async function issueTicket(){setState({busy:true});const nextNum=await db.getNextNumber();await db.issueTicket(nextNum);setState({myTicketNumber:nextNum,busy:false});await refresh()}
function checkAuth(){const pw=document.getElementById("pw-input")?.value;if(pw===STAFF_PASSWORD){setState({staffAuthed:true})}else{const el=document.getElementById("pw-error");const inp=document.getElementById("pw-input");if(el)el.style.display="block";if(inp){inp.classList.add("error-border");inp.value=""}}}
async function callNext(){const waiting=state.tickets.filter(t=>t.status==="waiting");if(!waiting.length)return;setState({busy:true});await db.updateState({calling:waiting[0].number});await refresh();setState({busy:false})}
async function confirmEntry(num){setState({busy:true});await db.updateTicket(num,{status:"inside"});await db.updateState({calling:null});await refresh();setState({busy:false})}
async function exitTicket(num){setState({busy:true});await db.updateTicket(num,{status:"done"});await refresh();setState({busy:false})}
async function cancelCall(){setState({busy:true});await db.updateState({calling:null});await refresh();setState({busy:false})}
async function changeCapacity(delta){const next=Math.max(1,state.dbState.capacity+delta);await db.updateState({capacity:next});await refresh()}
async function resetAll(){if(!confirm("全データをリセットしますか？"))return;for(const t of state.tickets)await db.updateTicket(t.number,{status:"done"});await db.updateState({calling:null});await refresh()}
refresh();setInterval(refresh,3000);
</script></body></html>
